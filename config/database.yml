default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS", 5) %>
  timeout: 5000

development:
  <<: *default
  database: <%= ENV.fetch("BOLAOADS_DEVELOPMENT_DATABASE", Rails.root.join("db/development.sqlite3")) %>

test:
  <<: *default
  database: <%= ENV.fetch("BOLAOADS_TEST_DATABASE", Rails.root.join("db/test.sqlite3")) %>

production:
  <<: *default
  database: storage/production.sqlite3
